services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: edums_db
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - "3307:3306"

  edums:
    container_name: edums
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USERNAME: user
      DATABASE_PASSWORD: 123456
    depends_on:
      - mysql

networks:
  default:
    name: backend-network

volumes:
  mysql: