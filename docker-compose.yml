services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DATABASE_NAME:-edums_db}
      MYSQL_USER: ${DATABASE_USERNAME:-user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-123456}
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DATABASE_USERNAME:-user} -p${DATABASE_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  edums:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_NAME: ${DATABASE_NAME:-edums_db}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-123456}
    depends_on:
      mysql:
        condition: service_healthy

networks:
  default:
    name: backend-network

volumes:
  mysql:
